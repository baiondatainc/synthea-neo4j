<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sutherland Global Services — RP Dataset ER Diagram</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1b2a;color:#e2e8f0;overflow:hidden;height:100vh}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:#080f18;border-bottom:1px solid rgba(255,255,255,.08);
  position:fixed;top:0;left:0;right:0;z-index:100;height:52px}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{font-size:13px;font-weight:700;color:#00d9a6;letter-spacing:.5px}
.subtitle{font-size:11px;color:#64748b}
.stats{display:flex;gap:16px}
.stat{font-size:11px;color:#64748b}
.stat span{color:#00d9a6;font-weight:600}
.hint{font-size:11px;color:#475569;font-style:italic}

/* ── Canvas ── */
#canvas-wrap{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
svg#er{width:100%;height:100%}

/* ── Table nodes ── */
.table-node{cursor:pointer;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
.table-node rect.body{rx:10;fill:#13223a;stroke:rgba(255,255,255,.1);stroke-width:1}
.table-node rect.header{rx:10;fill:#0d1b2a}
.table-node rect.header-bottom{fill:#0d1b2a}
.table-node text.tname{font-size:13px;font-weight:700;fill:#e2e8f0;font-family:'Segoe UI',sans-serif}
.table-node text.tfolder{font-size:9px;fill:#475569;font-family:'Segoe UI',sans-serif}
.table-node text.trows{font-size:9px;fill:#00d9a6;font-family:'Segoe UI',sans-serif}
.table-node.selected rect.body{stroke:#00d9a6;stroke-width:2}
.table-node:hover rect.body{stroke:rgba(0,217,166,.5);stroke-width:1.5}

/* ── FK lines ── */
.fk-line{fill:none;stroke:#1a3560;stroke-width:1.5;opacity:.7}
.fk-line.highlight{stroke:#00d9a6;opacity:1;stroke-width:2}
.fk-arrow{fill:#1a3560}
.fk-arrow.highlight{fill:#00d9a6}

/* ── Side panel ── */
#panel{position:fixed;top:52px;right:0;width:360px;height:calc(100vh - 52px);
  background:#080f18;border-left:1px solid rgba(255,255,255,.08);
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;z-index:200;overflow:hidden}
#panel.open{transform:translateX(0)}
.panel-header{padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.panel-title{font-size:15px;font-weight:700;color:#e2e8f0}
.panel-meta{font-size:11px;color:#475569;margin-top:3px}
.panel-close{position:absolute;top:14px;right:16px;background:none;border:none;
  color:#475569;cursor:pointer;font-size:18px;line-height:1}
.panel-close:hover{color:#e2e8f0}
.panel-search{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.panel-search input{width:100%;background:#13223a;border:1px solid rgba(255,255,255,.1);
  border-radius:6px;padding:6px 10px;color:#e2e8f0;font-size:12px;outline:none}
.panel-search input:focus{border-color:#00d9a6}
.col-list{flex:1;overflow-y:auto;padding:8px 0}
.col-list::-webkit-scrollbar{width:4px}
.col-list::-webkit-scrollbar-thumb{background:#1a3560;border-radius:2px}
.col-item{display:flex;align-items:flex-start;gap:8px;padding:7px 20px;
  border-bottom:1px solid rgba(255,255,255,.03);cursor:default;
  transition:background .1s}
.col-item:hover{background:rgba(255,255,255,.03)}
.col-item.pk{background:rgba(0,217,166,.05)}
.col-item.pk .col-name{color:#00d9a6}
.col-item.fk .col-name{color:#60a5fa}
.col-badge{flex-shrink:0;width:22px;height:22px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;margin-top:1px}
.badge-pk{background:rgba(0,217,166,.2);color:#00d9a6}
.badge-fk{background:rgba(96,165,250,.2);color:#60a5fa}
.badge-col{background:rgba(255,255,255,.06);color:#64748b}
.col-info{flex:1;min-width:0}
.col-name{font-size:12px;font-weight:500;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-dtype{font-size:10px;color:#475569;margin-top:1px}
.col-null{flex-shrink:0;font-size:9px;padding:1px 5px;border-radius:3px;margin-top:2px}
.null-high{background:rgba(239,68,68,.15);color:#f87171}
.null-med{background:rgba(251,191,36,.1);color:#fbbf24}
.null-low{background:rgba(0,217,166,.1);color:#00d9a6}
.col-sample{font-size:9px;color:#334155;margin-top:1px;font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}

/* ── Mini-legend ── */
.legend{position:fixed;bottom:16px;left:20px;background:#080f18;
  border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 14px;
  display:flex;flex-direction:column;gap:6px;font-size:10px;color:#475569}
.legend-item{display:flex;align-items:center;gap:6px}
.leg-line{width:24px;height:2px;background:#1a3560;border-radius:1px}
.leg-line.hl{background:#00d9a6}
.leg-dot{width:10px;height:10px;border-radius:2px}
.leg-pk{background:rgba(0,217,166,.3)}
.leg-fk{background:rgba(96,165,250,.3)}

/* ── Controls ── */
.controls{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px}
.ctrl-btn{width:32px;height:32px;background:#13223a;border:1px solid rgba(255,255,255,.1);
  border-radius:8px;color:#94a3b8;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl-btn:hover{background:#1a3560;color:#e2e8f0}
</style>
</head>

// ── Compute table heights ─────────────────────────────────────────────────────
const TW = 200;
const ROW_H = 22;
const HEADER_H = 52;
const MAX_PREVIEW = 6;

function tableHeight(name) {
  const n = Math.min(SCHEMA[name].cols.length, MAX_PREVIEW);
  return HEADER_H + n * ROW_H + 8;
}

// ── SVG helpers ───────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}, parent=null) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if (parent) parent.appendChild(e);
  return e;
}
function txt(content, attrs={}, parent=null) {
  const t = el('text', attrs, parent);
  t.textContent = content;
  return t;
}

// ── Pan / zoom ────────────────────────────────────────────────────────────────
let vx=0, vy=0, vz=1;
const scene = document.getElementById('scene');
const wrap   = document.getElementById('canvas-wrap');

function applyTransform() {
  scene.setAttribute('transform', `translate(${vx},${vy}) scale(${vz})`);
}

let dragging=false, startX=0, startY=0, startVX=0, startVY=0;
wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.table-node')) return;
  dragging=true; startX=e.clientX; startY=e.clientY; startVX=vx; startVY=vy;
  wrap.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  vx = startVX + (e.clientX - startX);
  vy = startVY + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging=false; wrap.classList.remove('dragging'); });
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  vx = mx - factor * (mx - vx);
  vy = my - factor * (my - vy);
  vz *= factor;
  vz = Math.max(0.2, Math.min(3, vz));
  applyTransform();
}, {passive:false});

document.getElementById('btn-zin').onclick  = () => { vz=Math.min(3,vz*1.2); applyTransform(); };
document.getElementById('btn-zout').onclick = () => { vz=Math.max(0.2,vz/1.2); applyTransform(); };
document.getElementById('btn-fit').onclick  = fitAll;

function fitAll() {
  const names = Object.keys(SCHEMA);
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  names.forEach(n => {
    const p = POSITIONS[n] || {x:0,y:0};
    const h = tableHeight(n);
    minX=Math.min(minX,p.x); minY=Math.min(minY,p.y);
    maxX=Math.max(maxX,p.x+TW); maxY=Math.max(maxY,p.y+h);
  });
  const pw = wrap.clientWidth, ph = wrap.clientHeight - 0;
  const gw = maxX-minX+80, gh = maxY-minY+80;
  vz = Math.min(pw/gw, ph/gh, 1);
  vx = (pw - gw*vz)/2 - minX*vz + 40*vz;
  vy = (ph - gh*vz)/2 - minY*vz + 40*vz;
  applyTransform();
}

// ── Draw FK lines ─────────────────────────────────────────────────────────────
function portCoord(name, port) {
  const p = POSITIONS[name] || {x:0,y:0};
  const h = tableHeight(name);
  const cx = p.x + TW/2, cy = p.y + h/2;
  switch(port) {
    case 'top':    return {x:cx, y:p.y};
    case 'bottom': return {x:cx, y:p.y+h};
    case 'left':   return {x:p.x, y:cy};
    case 'right':  return {x:p.x+TW, y:cy};
    default:       return {x:cx, y:cy};
  }
}

const linksLayer = document.getElementById('links-layer');
const linkEls = {};

RELATIONS.forEach((r,i) => {
  const a = portCoord(r.from, r.fromPort);
  const b = portCoord(r.to,   r.toPort);
  const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
  // cubic bezier
  const dx = b.x-a.x, dy = b.y-a.y;
  const cx1 = a.x + dx*0.5, cy1 = a.y;
  const cx2 = b.x - dx*0.5, cy2 = b.y;
  const d = `M${a.x},${a.y} C${cx1},${cy1} ${cx2},${cy2} ${b.x},${b.y}`;

  const path = el('path',{d, class:'fk-line', 'marker-end':'url(#arr)'}, linksLayer);
  linkEls[i] = path;
});

// ── Draw table nodes ──────────────────────────────────────────────────────────
const nodesLayer = document.getElementById('nodes-layer');
let selectedTable = null;

Object.entries(SCHEMA).forEach(([name, info]) => {
  const pos = POSITIONS[name] || {x:50,y:50};
  const h = tableHeight(name);
  const color = FOLDER_COLORS[info.folder] || '#94a3b8';

  const g = el('g', {class:'table-node', transform:`translate(${pos.x},${pos.y})`}, nodesLayer);
  g.dataset.name = name;

  // Body
  el('rect', {class:'body', width:TW, height:h}, g);
  // Header background
  el('rect', {class:'header', width:TW, height:HEADER_H, rx:10, ry:10}, g);
  el('rect', {class:'header-bottom', x:0, y:HEADER_H-10, width:TW, height:10}, g);
  // Accent top bar
  el('rect', {x:0, y:0, width:TW, height:4, rx:2, fill:color, opacity:.9}, g);

  // Table name
  txt(name, {class:'tname', x:10, y:22}, g);
  // Folder label
  txt(info.folder, {class:'tfolder', x:10, y:35}, g);
  // Row count
  txt(info.rows.toLocaleString()+' rows', {class:'trows', x:TW-8, y:35, 'text-anchor':'end'}, g);

  // Divider
  el('line', {x1:0, y1:HEADER_H, x2:TW, y2:HEADER_H, stroke:'rgba(255,255,255,.08)'}, g);

  // Column previews (first MAX_PREVIEW cols)
  const preview = info.cols.slice(0, MAX_PREVIEW);
  preview.forEach((col,idx) => {
    const cy = HEADER_H + 4 + idx*ROW_H + ROW_H*0.65;
    const isPK = (PK_COLS[name]||[]).includes(col.name);
    const isFK = (FK_COLS[name]||[]).includes(col.name) && !isPK;
    const colColor = isPK ? '#00d9a6' : isFK ? '#60a5fa' : '#64748b';
    const badge = isPK ? '🔑' : isFK ? '🔗' : '';

    if (badge) txt(badge, {x:8, y:cy, 'font-size':'9', opacity:.8}, g);
    txt(col.name, {x: badge?20:10, y:cy, 'font-size':'10', fill:colColor,
      'font-family':'monospace'}, g);
  });

  if (info.cols.length > MAX_PREVIEW) {
    const more = info.cols.length - MAX_PREVIEW;
    txt(`+${more} more columns`, {
      x:TW/2, y: HEADER_H + 4 + MAX_PREVIEW*ROW_H + ROW_H*0.65,
      'font-size':'9', fill:'#334155', 'text-anchor':'middle'
    }, g);
  }

  // Click handler
  g.addEventListener('click', (e) => {
    e.stopPropagation();
    openPanel(name, info);
    // Highlight FK lines
    highlightTable(name);
  });
});

function highlightTable(name) {
  // Reset all
  document.querySelectorAll('.fk-line').forEach(l => {
    l.classList.remove('highlight');
    l.setAttribute('marker-end','url(#arr)');
  });
  document.querySelectorAll('.table-node').forEach(n => n.classList.remove('selected'));

  const node = document.querySelector(`.table-node[data-name="${name}"]`);
  if (node) node.classList.add('selected');

  selectedTable = name;
  RELATIONS.forEach((r,i) => {
    if (r.from === name || r.to === name) {
      const line = linkEls[i];
      if (line) {
        line.classList.add('highlight');
        line.setAttribute('marker-end','url(#arr-hl)');
      }
    }
  });
}

// ── Side panel ────────────────────────────────────────────────────────────────
const panel      = document.getElementById('panel');
const panelTitle = document.getElementById('panel-title');
const panelMeta  = document.getElementById('panel-meta');
const colList    = document.getElementById('col-list');
const colSearch  = document.getElementById('col-search');

let currentCols = [];

document.getElementById('panel-close').onclick = closePanel;
document.getElementById('canvas-wrap').addEventListener('click', closePanel);

function closePanel() {
  panel.classList.remove('open');
  document.querySelectorAll('.fk-line').forEach(l => {
    l.classList.remove('highlight');
    l.setAttribute('marker-end','url(#arr)');
  });
  document.querySelectorAll('.table-node').forEach(n => n.classList.remove('selected'));
  selectedTable = null;
}

function openPanel(name, info) {
  panelTitle.textContent = name;
  const color = FOLDER_COLORS[info.folder] || '#94a3b8';
  panelMeta.innerHTML = `<span style="color:${color}">${info.folder}</span> &nbsp;·&nbsp; 
    <strong style="color:#00d9a6">${info.rows.toLocaleString()}</strong> rows &nbsp;·&nbsp; 
    ${info.cols.length} columns`;
  currentCols = info.cols;
  colSearch.value = '';
  renderCols(info.cols, name);
  panel.classList.add('open');
}

function renderCols(cols, name) {
  colList.innerHTML = '';
  const q = colSearch.value.toLowerCase();
  const filtered = q ? cols.filter(c => c.name.toLowerCase().includes(q)) : cols;

  filtered.forEach(col => {
    const isPK = (PK_COLS[name||selectedTable]||[]).includes(col.name);
    const isFK = (FK_COLS[name||selectedTable]||[]).includes(col.name) && !isPK;
    const nullPct = col.null_pct;
    const nullClass = nullPct > 60 ? 'null-high' : nullPct > 20 ? 'null-med' : 'null-low';

    const item = document.createElement('div');
    item.className = 'col-item' + (isPK?' pk':'') + (isFK?' fk':'');

    item.innerHTML = `
      <div class="col-badge ${isPK?'badge-pk':isFK?'badge-fk':'badge-col'}">
        ${isPK?'PK':isFK?'FK':''}
      </div>
      <div class="col-info">
        <div class="col-name">${col.name}</div>
        <div class="col-dtype">${col.dtype}</div>
        ${col.sample ? `<div class="col-sample">e.g. ${col.sample}</div>` : ''}
      </div>
      <div class="col-null ${nullClass}">${nullPct}%</div>
    `;
    colList.appendChild(item);
  });
  if (!filtered.length) {
    colList.innerHTML = '<div style="padding:20px;text-align:center;color:#334155;font-size:12px">No columns match</div>';
  }
}

colSearch.addEventListener('input', () => {
  renderCols(currentCols, selectedTable);
});

// ── Initial fit ───────────────────────────────────────────────────────────────
setTimeout(fitAll, 100);
</script>
</body>
</html>
