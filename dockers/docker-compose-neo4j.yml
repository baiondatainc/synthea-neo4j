services:
  neo4j-import:
    image: neo4j:5.26-community
    container_name: neo4j_import
    volumes:
      - neo4j_data:/data
      - ./import:/var/lib/neo4j/import
    entrypoint:
      - "neo4j-admin"
      - "database"
      - "import"
      - "full"
      - "neo4j"
      - "--nodes=Patient=/var/lib/neo4j/import/nodes_Patient.csv"
      - "--nodes=Practice=/var/lib/neo4j/import/nodes_Practice.csv"
      - "--nodes=Location=/var/lib/neo4j/import/nodes_Location.csv"
      - "--nodes=InsurancePlan=/var/lib/neo4j/import/nodes_InsurancePlan.csv"
      - "--nodes=Campaign=/var/lib/neo4j/import/nodes_Campaign.csv"
      - "--nodes=BirdeyeReview=/var/lib/neo4j/import/nodes_BirdeyeReview.csv"
      - "--nodes=Visit=/var/lib/neo4j/import/nodes_Visit.csv"
      - "--nodes=Charge=/var/lib/neo4j/import/nodes_Charge.csv"
      - "--nodes=Transaction=/var/lib/neo4j/import/nodes_Transaction.csv"
      - "--nodes=Statement=/var/lib/neo4j/import/nodes_Statement.csv"
      - "--nodes=RCCall=/var/lib/neo4j/import/nodes_RCCall.csv"
      - "--nodes=IVRInbound=/var/lib/neo4j/import/nodes_IVRInbound.csv"
      - "--nodes=DiallerCall=/var/lib/neo4j/import/nodes_DiallerCall.csv"
      - "--nodes=PhoneBridge=/var/lib/neo4j/import/nodes_PhoneBridge.csv"
      - "--nodes=DiagnosisCode=/var/lib/neo4j/import/nodes_DiagnosisCode.csv"
      - "--nodes=ProcedureCode=/var/lib/neo4j/import/nodes_ProcedureCode.csv"
      - "--relationships=REGISTERED_AT=/var/lib/neo4j/import/rels_REGISTERED_AT.csv"
      - "--relationships=BELONGS_TO_PRACTICE=/var/lib/neo4j/import/rels_BELONGS_TO_PRACTICE.csv"
      - "--relationships=ISSUED_BY_PRACTICE=/var/lib/neo4j/import/rels_ISSUED_BY_PRACTICE.csv"
      - "--relationships=RUN_BY=/var/lib/neo4j/import/rels_RUN_BY.csv"
      - "--relationships=REVIEWS=/var/lib/neo4j/import/rels_REVIEWS.csv"
      - "--relationships=HAD_VISIT=/var/lib/neo4j/import/rels_HAD_VISIT.csv"
      - "--relationships=PERFORMED_AT=/var/lib/neo4j/import/rels_PERFORMED_AT.csv"
      - "--relationships=UNDER_PLAN=/var/lib/neo4j/import/rels_UNDER_PLAN.csv"
      - "--relationships=HAS_CHARGE=/var/lib/neo4j/import/rels_HAS_CHARGE.csv"
      - "--relationships=PART_OF_VISIT=/var/lib/neo4j/import/rels_PART_OF_VISIT.csv"
      - "--relationships=AT_LOCATION=/var/lib/neo4j/import/rels_AT_LOCATION.csv"
      - "--relationships=DIAGNOSED_WITH=/var/lib/neo4j/import/rels_DIAGNOSED_WITH.csv"
      - "--relationships=USES_PROCEDURE=/var/lib/neo4j/import/rels_USES_PROCEDURE.csv"
      - "--relationships=SETTLES=/var/lib/neo4j/import/rels_SETTLES.csv"
      - "--relationships=HAS_TRANSACTION=/var/lib/neo4j/import/rels_HAS_TRANSACTION.csv"
      - "--relationships=RECEIVED_STATEMENT=/var/lib/neo4j/import/rels_RECEIVED_STATEMENT.csv"
      - "--relationships=PART_OF_CAMPAIGN=/var/lib/neo4j/import/rels_PART_OF_CAMPAIGN.csv"
      - "--relationships=ATTRIBUTED_TO_PHONE=/var/lib/neo4j/import/rels_ATTRIBUTED_TO_PHONE.csv"
      - "--relationships=IDENTIFIED_BY_PHONE=/var/lib/neo4j/import/rels_IDENTIFIED_BY_PHONE.csv"
      - "--relationships=CALLED_IVR=/var/lib/neo4j/import/rels_CALLED_IVR.csv"
      - "--relationships=CONTACTED_BY_DIALLER=/var/lib/neo4j/import/rels_CONTACTED_BY_DIALLER.csv"
      - "--relationships=BRIDGES_TO_PATIENT=/var/lib/neo4j/import/rels_BRIDGES_TO_PATIENT.csv"
      - "--overwrite-destination=true"
      - "--skip-bad-relationships=true"
      - "--skip-duplicate-nodes=true"
      - "--high-parallel-io=on"
      - "--verbose"
    profiles: ["import"]
  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j_rp
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/rp_strong_pass_2025

      # ── Memory — 32GB total for Neo4j on 62GB server ──────────────────────
      # heap:      8GB  — JVM query execution, aggregations, sorting
      # pagecache: 24GB — entire RP graph fits in RAM (11GB data + headroom)
      # remaining: 30GB free for OS, Python ingestion, LibreChat, Ollama
      - NEO4J_server_memory_heap_initial__size=2G
      - NEO4J_server_memory_heap_max__size=8G
      - NEO4J_server_memory_pagecache__size=24G

      # Disable strict config validation (prevents boot failure on minor setting issues)
      - NEO4J_server_config_strict__validation_enabled=false

      # ── Transaction memory — critical for large batch ingestion ───────────
      # Each parallel worker needs transaction memory for 5000-row batches
      - NEO4J_db_memory_transaction_total_max=4G
      - NEO4J_db_memory_transaction_max=1G

      # ── Connection pool — support 4 parallel ingestion workers ────────────
      - NEO4J_dbms_connector_bolt_thread__pool__min__size=4
      - NEO4J_dbms_connector_bolt_thread__pool__max__size=40

      # ── Plugins ────────────────────────────────────────────────────────────
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*

      # ── CSV import ─────────────────────────────────────────────────────────
      - NEO4J_dbms_security_allow__csv__import__from__file__urls=true

      # ── Bolt / HTTP listeners ──────────────────────────────────────────────
      - NEO4J_dbms_connector_bolt_listen__address=0.0.0.0:7687
      - NEO4J_dbms_connector_http_listen__address=0.0.0.0:7474

      # ── Checkpoint — flush dirty pages less often during bulk load ─────────
      - NEO4J_db_checkpoint_interval_time=5m
      - NEO4J_db_checkpoint_interval_tx=100000

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./import:/var/lib/neo4j/import
      - ./plugins:/plugins

    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "rp_strong_pass_2025", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local